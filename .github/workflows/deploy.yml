# =============================================================================
# Static Site Deploy — AWS S3 + CloudFront (prod)
# =============================================================================
#
# Push to master -> npm build -> sync to S3 -> invalidate CloudFront.
# Manual workflow_dispatch retained for ad-hoc redeploys.
#
# Required repo secrets:
#   AWS_STATIC_SITES_DEPLOY_KEY_ID
#   AWS_STATIC_SITES_DEPLOY_SECRET
# =============================================================================

name: Deploy Portfolio to Production

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: static-site-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SITE_NAME: tvvignesh-website
  OUTPUT_DIR: dist
  AWS_REGION: ap-south-1
  PROD_BUCKET: burdenoff-aws-prod-tvvignesh-website
  PROD_DISTRIBUTION: E1COC0FIZ2USWP

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy (prod)
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build
        run: |
          npm ci
          npm run build
          echo "Build complete: $(du -sh $OUTPUT_DIR/ | awk '{print $1}')"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_STATIC_SITES_DEPLOY_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_STATIC_SITES_DEPLOY_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (immutable, long cache)
        run: |
          aws s3 sync "$OUTPUT_DIR/" "s3://$PROD_BUCKET/" \
            --no-progress \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" \
            --include "assets/*" \
            --include "static/*" \
            --include "img/*" \
            --include "*.woff" --include "*.woff2"

      - name: Sync everything else (short cache, delete stale)
        run: |
          aws s3 sync "$OUTPUT_DIR/" "s3://$PROD_BUCKET/" \
            --delete \
            --no-progress \
            --cache-control "public, max-age=60, s-maxage=300, must-revalidate" \
            --exclude "assets/*" \
            --exclude "static/*" \
            --exclude "img/*" \
            --exclude "*.woff" --exclude "*.woff2"

      - name: CloudFront invalidation
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$PROD_DISTRIBUTION" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation: $INVALIDATION_ID"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Static Site Deploy — prod"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Site | \`$SITE_NAME\` |"
            echo "| Bucket | \`$PROD_BUCKET\` |"
            echo "| Distribution | \`$PROD_DISTRIBUTION\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| SHA | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
